<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的專屬 AI 助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 設定 Tailwind 支援 class 模式的 Dark Mode
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <style>
    /* 滾動條美化 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    /* 動態背景漸層動畫 */
    body {
      background-size: 400% 400%;
      animation: gradientBG 8s ease infinite;
      transition: background-color 2s ease;
    }
    /* 淺色模式動態背景 (柔和藍紫) */
    html:not(.dark) body {
      background-image: linear-gradient(-45deg, #f3f4f6, #e0e7ff, #f3e8ff, #f3f4f6);
    }
    /* 深色模式動態背景 (深邃藍紫) */
    html.dark body {
      background-image: linear-gradient(-45deg, #111827, #0e1b25, #0f172a, #111827);
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 玻璃擬態 (Glassmorphism) 面板設定 */
    .glass-panel {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    
    /* 讓 Markdown 表格長得像樣一點 */
    .prose table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    .prose th, .prose td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .dark .prose th, .dark .prose td { border-color: #475569; }
    .prose th { background-color: rgba(0,0,0,0.05); }
    .dark .prose th { background-color: rgba(255,255,255,0.1); }
    .prose ul, .prose ol { padding-left: 1.5rem; margin: 10px 0; }
    .prose ul { list-style-type: disc; }
    .prose p { margin-bottom: 8px; }
  </style>
</head>
<body class="h-screen flex text-gray-800 dark:text-gray-200 transition-colors duration-300">

  <div class="w-80 p-5 flex flex-col gap-4 shadow-2xl z-10 glass-panel bg-white/70 dark:bg-gray-900/70 border-r border-white/20 dark:border-gray-700/50">
    <div class="flex justify-between items-center mb-2">
      <h2 class="text-xl font-bold">⚙️ 設定面板</h2>
      <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
    
    <div class="space-y-3 overflow-y-auto pr-2">
        <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500">Groq API Key</label>
        <input type="password" id="apiKey" placeholder="gsk_..." class="mt-1 block w-full rounded-lg border-gray-300 dark:border-gray-600 bg-white/50 dark:bg-gray-800/50 p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500">選擇模型</label>
        <select id="modelSelect" class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <optgroup label="通用對話 (Text to Text)">
            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
            <option value="moonshotai/kimi-k2-instruct-0905">Kimi K2 (多語言/中文佳)</option>
            </optgroup>
            <optgroup label="推理 (Reasoning)">
            <option value="openai/gpt-oss-120b">GPT OSS 120B (高強推理)</option>
            <option value="openai/gpt-oss-20b">GPT OSS 20B</option>
            <!-- <option value="qwen/qwen3-32b">Qwen 3 32B</option> -->
            </optgroup>
            <optgroup label="視覺與圖片 (Vision)">
            <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout (支援圖片)</option>
            </optgroup>
        </select>
        </div>

        <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500">System Prompt</label>
        <textarea id="systemPrompt" rows="3" class="mt-1 block w-full rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">你是一個繁體中文的 AI 助手，回答要簡潔有力。</textarea>
        </div>

        <div class="flex items-center justify-between">
        <label class="text-xs font-bold uppercase text-gray-500">Temperature: <span id="tempValue">0.7</span></label>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7" class="w-36 accent-blue-500">
        </div>

        <div class="flex items-center justify-between">
        <label class="text-xs font-bold uppercase text-gray-500">Top P: <span id="topPValue">0.9</span></label>
        <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9" class="w-36 accent-blue-500">
        </div>
        
        <div class="flex items-center gap-2">
        <input type="checkbox" id="streamToggle" checked class="h-4 w-4 text-blue-600 rounded bg-gray-100 dark:bg-gray-800 border-gray-300 dark:border-gray-600">
        <label class="text-xs font-bold uppercase text-gray-500">啟用 Streaming (打字機效果)</label>
        </div>    
    </div>
    
    
    <!-- <button onclick="clearChat()" class="mt-auto w-full bg-red-500/90 text-white p-2 rounded-md hover:bg-red-600 transition shadow-lg">🗑️ 清空對話</button> -->
    <button onclick="clearChat()" class="mt-auto w-full py-3 px-4 rounded-xl font-bold tracking-wide transition-all duration-300 
        /* 基礎樣式：毛玻璃 */
        glass-panel border shadow-lg flex items-center justify-center gap-2
        /* 淺色模式：白底半透明 + 藍灰色文字 */
        bg-white/40 border-white/40 text-slate-600 hover:bg-white/60 hover:text-red-500 hover:border-red-200
        /* 深色模式：黑底半透明 + 淺灰色文字 */
        dark:bg-slate-800/40 dark:border-slate-700/50 dark:text-slate-300 dark:hover:bg-red-900/30 dark:hover:text-red-400 dark:hover:border-red-900/50">
        <span class="text-lg">🗑️</span>
        <span>清空對話</span>
    </button>

  </div>

  <div class="flex-1 flex flex-col relative">
    <div id="chatBox" class="flex-1 p-6 overflow-y-auto space-y-6 pb-32">
      <div class="text-center text-gray-500 dark:text-gray-400 mt-10">請在左側輸入 API Key 後開始對話</div>
    </div>

    <div class="absolute bottom-0 left-0 right-0 p-4 glass-panel bg-white/80 dark:bg-gray-900/80 border-t border-white/20 dark:border-gray-700/50">
      
      <div id="imagePreviewContainer" class="hidden mb-2 relative inline-block">
        <img id="imagePreview" src="" class="h-20 rounded-lg border border-gray-300 dark:border-gray-600 object-cover">
        <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs hover:bg-red-600">x</button>
      </div>

      <div class="flex gap-2 max-w-5xl mx-auto items-end">
        
        <label class="cursor-pointer p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition flex-shrink-0" title="上傳圖片">
          📁
          <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
        </label>

        <button id="micBtn" class="p-3 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition flex-shrink-0" title="點擊錄音，再點擊發送">
          🎙️
        </button>

        <textarea id="userInput" rows="1" placeholder="輸入訊息... (Shift+Enter 換行, Enter 發送)" class="flex-1 resize-none rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        
        <button id="sendBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium transition disabled:bg-gray-500 disabled:cursor-not-allowed shadow-md">發送</button>
      </div>
      <div id="recordingStatus" class="text-center text-xs text-red-500 mt-1 hidden animate-pulse">正在錄音... 再次點擊麥克風結束並辨識</div>
    </div>
  </div>

  <script>
    // --- 日夜模式切換邏輯 ---
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('themeIcon').innerText = isDark ? '☀️' : '🌙';
    }

    // --- UI 狀態連動 ---
    document.getElementById('temperature').addEventListener('input', (e) => document.getElementById('tempValue').innerText = e.target.value);    
    document.getElementById('topP').addEventListener('input', (e) => document.getElementById('topPValue').innerText = e.target.value);

    // --- 圖片上傳邏輯 (Vision) ---
    let currentImageBase64 = null;
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        currentImageBase64 = e.target.result;
        document.getElementById('imagePreview').src = currentImageBase64;
        document.getElementById('imagePreviewContainer').classList.remove('hidden');
        
        // 自動切換到 Vision 模型
        document.getElementById('modelSelect').value = "meta-llama/llama-4-scout-17b-16e-instruct";
      };
      reader.readAsDataURL(file);
    }
    function removeImage() {
      currentImageBase64 = null;
      document.getElementById('imageInput').value = "";
      document.getElementById('imagePreviewContainer').classList.add('hidden');
    }

    // --- 語音輸入邏輯 (Whisper API) ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    document.getElementById('micBtn').addEventListener('click', async () => {
      if (isRecording) {
        // 停止錄音
        mediaRecorder.stop();
        document.getElementById('recordingStatus').classList.add('hidden');
        document.getElementById('micBtn').classList.remove('bg-red-500', 'text-white');
        isRecording = false;
        return;
      }

      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) return alert("請先輸入 Groq API Key 才能使用語音辨識！");

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          const file = new File([audioBlob], "audio.webm", { type: "audio/webm" });
          
          const formData = new FormData();
          formData.append("file", file);
          formData.append("model", "whisper-large-v3");

          document.getElementById('userInput').placeholder = "語音辨識中...";
          
          try {
            const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${apiKey}` },
              body: formData
            });
            const data = await response.json();
            if (data.text) {
              const inputEl = document.getElementById('userInput');
              inputEl.value += (inputEl.value ? " " : "") + data.text;
            } else {
              alert("辨識失敗：" + JSON.stringify(data));
            }
          } catch (err) {
            console.error(err);
            alert("語音辨識發生錯誤");
          } finally {
            document.getElementById('userInput').placeholder = "輸入訊息... (Shift+Enter 換行, Enter 發送)";
          }
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById('recordingStatus').classList.remove('hidden');
        document.getElementById('micBtn').classList.add('bg-red-500', 'text-white');

      } catch (err) {
        alert("無法存取麥克風，請確認瀏覽器權限。");
      }
    });

    // --- 聊天核心邏輯 ---
    let messageHistory = []; 

    function clearChat() {
      messageHistory = [];
      document.getElementById('chatBox').innerHTML = '';
    }

    function appendMessage(role, content, imageUrl = null) {
      const chatBox = document.getElementById('chatBox');
      const msgDiv = document.createElement('div');
      msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
    
      const bubble = document.createElement('div');
      // 加入 "prose" class 方便套用我們寫的 Markdown 樣式
      bubble.className = `max-w-[85%] p-4 rounded-2xl shadow-md ${role === 'user' ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 rounded-tl-sm'} prose dark:prose-invert`;
    
      if (imageUrl) {
        const img = document.createElement('img');
        img.src = imageUrl;
        img.className = "max-w-full h-auto rounded-lg mb-2";
        bubble.appendChild(img);
      }
    
      const contentDiv = document.createElement('div');
      // 使用 DOMPurify + marked 解析 Markdown
      contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content));
      bubble.appendChild(contentDiv);
    
      msgDiv.appendChild(bubble);
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
      return contentDiv; // 回傳這個 div 供 streaming 更新
    }

    async function sendMessage() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const inputEl = document.getElementById('userInput');
      const text = inputEl.value.trim();
      const sendBtn = document.getElementById('sendBtn');
      
      if (!apiKey) return alert("請先輸入 Groq API Key！");
      if (!text && !currentImageBase64) return;

      const systemPrompt = document.getElementById('systemPrompt').value;
      const model = document.getElementById('modelSelect').value;
      const temperature = parseFloat(document.getElementById('temperature').value);
      const topP = parseFloat(document.getElementById('topP').value);
      const isStream = document.getElementById('streamToggle').checked;

      // --- 關鍵修正：判斷當前模型是否支援視覺 ---
      // 通常 ID 裡面包含 "vision" 字眼的就是視覺模型
      const isVisionModel = model.toLowerCase().includes('vision') || model.toLowerCase().includes('scout');

      // 1. 準備本次發送的內容
      let currentContent;
      if (currentImageBase64 && isVisionModel) {
        currentContent = [
          { type: "text", text: text || "請描述這張圖片" },
          { type: "image_url", image_url: { url: currentImageBase64 } }
        ];
      } else {
        currentContent = text;
      }

      // 2. 處理歷史紀錄：如果切換到純文字模型，必須將歷史中的 Array 轉回 String
      const sanitizedHistory = messageHistory.map(msg => {
        if (!isVisionModel && Array.isArray(msg.content)) {
        // 找尋陣列中的文字部分
          const textPart = msg.content.find(item => item.type === "text");
          return { ...msg, content: textPart ? textPart.text : "[圖片內容]" };
        }
        return msg;
      });

      const messagesToSend = [
        { role: 'system', content: systemPrompt },
        ...sanitizedHistory,
        { role: 'user', content: currentContent }
      ];

      // 更新介面
      appendMessage('user', text, currentImageBase64);
    
      // 存入原始紀錄（保留完整格式，以便之後再切回視覺模型時可能用到）
      messageHistory.push({ role: 'user', content: currentContent });
    
      inputEl.value = '';
      removeImage();
      sendBtn.disabled = true;
 
      const aiBubbleText = appendMessage('assistant', isStream ? '...' : '思考中...');

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: model,
            messages: messagesToSend,
            temperature: temperature,
            top_p: topP,
            stream: isStream
          })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(JSON.stringify(errorData));
        }

        let fullAiResponse = "";

        if (isStream) {
          aiBubbleText.innerText = "";
          const reader = response.body.getReader();
          const decoder = new TextDecoder("utf-8");
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n');
            
            for (const line of lines) {
              if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                try {
                  const parsed = JSON.parse(line.slice(6));
                  const token = parsed.choices[0].delta.content || "";
                  fullAiResponse += token;
                  aiBubbleText.innerHTML = DOMPurify.sanitize(marked.parse(fullAiResponse));
                  document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
                } catch (e) {}
              }
            }
          }
        } else {
          const data = await response.json();
          fullAiResponse = data.choices[0].message.content;
          aiBubbleText.innerHTML = DOMPurify.sanitize(marked.parse(fullAiResponse));
        }

        // 回答存入歷史紀錄 (只存文字)
        messageHistory.push({ role: 'assistant', content: fullAiResponse });

      } catch (error) {
        aiBubbleText.innerText = "發生錯誤：" + error.message;
        aiBubbleText.parentElement.classList.add('border-red-500');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // 綁定事件
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); 
        sendMessage();
      }
    });

    // 確保 textarea 自動調整高度 (簡易版)
    document.getElementById('userInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if(this.value === '') this.style.height = 'auto';
    });
  </script>
</body>
</html>
